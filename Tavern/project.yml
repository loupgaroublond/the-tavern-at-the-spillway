name: Tavern

options:
  bundleIdPrefix: com.tavern
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  defaultConfig: Debug
  fileTypes:
    icon:
      file: true  # Treat .icon bundles as single files (Icon Composer format)

settings:
  base:
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_MODULE_VERIFIER: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++14"
    STRING_CATALOG_GENERATE_SYMBOLS: YES

packages:
  ClodKit:
    path: ../../ClodKit

targets:
  TavernKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/TavernKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.tavernkit
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""

  ApprovalTile:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Tiles/ApprovalTile
    dependencies:
      - target: TavernKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.approvaltile
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""

  PermissionSettingsTile:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Tiles/PermissionSettingsTile
    dependencies:
      - target: TavernKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.permissionsettingstile
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""

  ServitorListTile:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Tiles/ServitorListTile
    dependencies:
      - target: TavernKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.servitorlisttile
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""

  ResourcePanelTile:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Tiles/ResourcePanelTile
    dependencies:
      - target: TavernKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.resourcepaneltile
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""

  ChatTile:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Tiles/ChatTile
    dependencies:
      - target: TavernKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.chattile
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""

  TavernBoardTile:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Tiles/TavernBoardTile
    dependencies:
      - target: TavernKit
      - target: ApprovalTile
      - target: PermissionSettingsTile
      - target: ServitorListTile
      - target: ResourcePanelTile
      - target: ChatTile
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.tavernboardtile
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""

  TavernCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/TavernCore
    dependencies:
      - target: TavernKit
      - package: ClodKit
        product: ClodKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.core
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""

  Tavern:
    type: application
    platform: macOS
    sources:
      - path: Sources/Tavern
    dependencies:
      - target: TavernCore
        embed: true
      - target: TavernKit
        embed: true
      - target: TavernBoardTile
        embed: true
      - target: ApprovalTile
        embed: true
      - target: PermissionSettingsTile
        embed: true
      - target: ServitorListTile
        embed: true
      - target: ResourcePanelTile
        embed: true
      - target: ChatTile
        embed: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.app
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      INFOPLIST_KEY_NSMainStoryboardFile: ""
      INFOPLIST_KEY_NSPrincipalClass: NSApplication
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_CFBundleIconName: AppIcon
      ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
    entitlements:
      path: Tavern.entitlements
      properties:
        com.apple.security.app-sandbox: false

  TavernCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TavernCoreTests
    dependencies:
      - target: TavernCore
      - target: TavernKit
      - target: ResourcePanelTile
      - target: PermissionSettingsTile
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.coretests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES

  TavernTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TavernTests
    dependencies:
      - target: Tavern
      - target: TavernCore
      - target: TavernKit
      - target: ChatTile
      - target: ResourcePanelTile
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.tests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES

  TavernStressTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TavernStressTests
    dependencies:
      - target: TavernCore
      - target: TavernKit
      - target: ResourcePanelTile
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.stresstests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES

  TavernIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TavernIntegrationTests
    dependencies:
      - target: TavernCore
      - target: TavernKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.integrationtests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES

  TavernUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/TavernUITests
    dependencies:
      - target: Tavern
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tavern.uitests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      TEST_TARGET_NAME: Tavern

schemes:
  Tavern:
    build:
      targets:
        Tavern: all
        TavernCore: all
        TavernCoreTests: [test]
        TavernTests: [test]
        TavernStressTests: [test]
        TavernIntegrationTests: [test]
        TavernUITests: [test]
    run:
      executable: Tavern
      config: Debug
    test:
      config: Debug
      targets:
        - TavernCoreTests
        - TavernTests
        - TavernStressTests
        - TavernIntegrationTests
        - TavernUITests
